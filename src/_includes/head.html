<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if title %}{{ title }} | {% endif %}{{ site.title }}</title>
<meta property="og:title" content="{{ title | default: site.title}}">
<meta name="description" content="{{ description | default: subtitle | default: site.description }}">
<meta name="og:description" content="{{ description | default: subtitle | default: site.description }}">
<meta name="author" content="{{ author }}">
<link rel="icon" type="image/svg+xml" sizes="any" href="/logo.svg">
<link rel="manifest" href="/manifest.json" />
<link type="application/atom+xml" rel="alternate" href="https://1up.fi/feed.xml" title="{{ site.title }}">
<link rel="stylesheet" href="/styles/global.css">
<link rel="stylesheet" href="/styles/print.css" media="print">
{% for style in styles %}
    <link rel="stylesheet" href="{{ style.href }}"{% if style.media %} media="{{ style.media }}"{% endif %}>
{% endfor %}
{% for script in scripts %}
    <script type="module" src="{{ script.src }}"></script>
{% endfor %}
<meta name="theme-color" content="{{ site.color  }}">
